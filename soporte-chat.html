<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soporte IA · NexoLED</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --cyan: #00e5ff;
  --magenta: #e040fb;
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #1a1a24;
  --border: rgba(255,255,255,0.08);
  --text: #f0f0f8;
  --muted: #7a7a99;
  --user-bubble: #1a1a2e;
  --ai-bubble: #111118;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
  font-size: 17px;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.85rem 1.25rem;
  border-bottom: 1px solid var(--border);
  background: rgba(10,10,15,0.98);
  flex-shrink: 0;
  backdrop-filter: blur(12px);
}
.logo-row { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--cyan), var(--magenta));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 600; color: #0a0a0f;
}
.logo-text { font-size: 18px; font-weight: 600; }
.logo-text span {
  background: linear-gradient(90deg, var(--cyan), var(--magenta));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.status-dot { display: flex; align-items: center; gap: 6px; font-size: 13px; font-family: 'JetBrains Mono', monospace; color: var(--muted); }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #39e58c; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

.close-chat-btn {
  background: none;
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--muted);
  width: 34px; height: 34px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.close-chat-btn:hover { border-color: var(--cyan); color: var(--cyan); }

.chat-area {
  flex: 1; overflow-y: auto; padding: 1.5rem 1rem;
  display: flex; flex-direction: column; gap: 1rem; scroll-behavior: smooth;
}
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.msg { display: flex; gap: 10px; max-width: 720px; width: 100%; animation: msgIn 0.25s ease; }
@keyframes msgIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
.msg.user { flex-direction: row-reverse; margin-left: auto; }
.msg.ai { margin-right: auto; }

.avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; flex-shrink: 0; margin-top: 2px;
}
.msg.ai .avatar { background: linear-gradient(135deg, var(--cyan), var(--magenta)); color: #0a0a0f; font-family: 'JetBrains Mono', monospace; }
.msg.user .avatar { background: var(--bg3); border: 1px solid var(--border); color: var(--muted); }

.bubble { padding: 13px 17px; border-radius: 14px; font-size: 17px; line-height: 1.65; max-width: calc(100% - 44px); }
.msg.user .bubble { background: var(--user-bubble); border: 1px solid rgba(0,229,255,0.15); border-top-right-radius: 4px; color: var(--text); }
.msg.ai .bubble { background: var(--ai-bubble); border: 1px solid var(--border); border-top-left-radius: 4px; color: var(--text); }

.bubble p { margin-bottom: 0.6rem; }
.bubble p:last-child { margin-bottom: 0; }
.bubble strong { font-weight: 600; color: var(--cyan); }
.bubble em { color: var(--muted); font-style: normal; font-size: 15px; }
.bubble ol, .bubble ul { padding-left: 1.2rem; margin: 0.5rem 0; }
.bubble li { margin-bottom: 6px; line-height: 1.55; }
.bubble code { font-family: 'JetBrains Mono', monospace; font-size: 14px; background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.15); padding: 1px 6px; border-radius: 4px; color: var(--cyan); }
.bubble hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
.bubble h1 { font-size: 19px; font-weight: 600; color: var(--text); margin: 0.75rem 0 0.4rem; line-height: 1.3; }
.bubble h2 { font-size: 17px; font-weight: 600; color: var(--cyan); margin: 0.75rem 0 0.4rem; line-height: 1.3; }
.bubble h3 { font-size: 15px; font-weight: 600; color: var(--muted); margin: 0.5rem 0 0.3rem; line-height: 1.3; }

.typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
.typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); opacity: 0.4; animation: blink 1.2s ease-in-out infinite; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,100%{opacity:0.4;} 50%{opacity:1;} }

.suggestions { padding: 0 1rem 0.5rem; display: flex; flex-wrap: wrap; gap: 6px; max-width: 720px; flex-shrink: 0; }
.sug-btn { padding: 7px 15px; border: 1px solid var(--border); border-radius: 20px; font-size: 14px; font-family: 'Space Grotesk', sans-serif; background: var(--bg2); color: var(--muted); cursor: pointer; transition: all 0.18s; white-space: nowrap; }
.sug-btn:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(0,229,255,0.06); }

.input-area { padding: 0.75rem 1rem 1rem; border-top: 1px solid var(--border); background: rgba(10,10,15,0.98); flex-shrink: 0; }
.input-row { display: flex; gap: 8px; max-width: 720px; margin: 0 auto; }
textarea {
  flex: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  padding: 12px 15px; font-size: 17px; font-family: 'Space Grotesk', sans-serif;
  color: var(--text); resize: none; outline: none; height: 50px; max-height: 130px;
  overflow-y: auto; line-height: 1.5; transition: border-color 0.2s;
}
textarea::placeholder { color: var(--muted); }
textarea:focus { border-color: rgba(0,229,255,0.4); }

.send-btn {
  width: 50px; height: 50px;
  background: linear-gradient(135deg, var(--cyan), #00b4d8);
  border: none; border-radius: 12px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: opacity 0.2s, transform 0.1s;
}
.send-btn:hover { opacity: 0.85; }
.send-btn:active { transform: scale(0.95); }
.send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.send-btn svg { width: 20px; height: 20px; fill: #0a0a0f; }

.footer-note { text-align: center; font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--muted); margin-top: 6px; opacity: 0.6; }

.welcome { max-width: 520px; margin: 1rem auto; text-align: center; padding: 2rem 1rem; }
.welcome-icon { width: 60px; height: 60px; background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(224,64,251,0.15)); border: 1px solid rgba(0,229,255,0.2); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 28px; }
.welcome h2 { font-size: 22px; font-weight: 600; margin-bottom: 0.5rem; }
.welcome p { font-size: 16px; color: var(--muted); line-height: 1.6; }

@media (max-width: 480px) {
  .status-dot span { display: none; }
  .bubble { font-size: 15px; }
  .welcome h2 { font-size: 20px; }
  .welcome p { font-size: 14px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo-row">
    <div class="logo-icon">NX</div>
    <div class="logo-text"><span>NexoLED</span></div>
  </div>
  <div class="status-dot">
    <div class="dot"></div>
    <span>Asistente IA activo</span>
  </div>
  <button class="close-chat-btn" onclick="cerrarChat()" aria-label="Cerrar soporte">✕</button>
</div>

<div class="chat-area" id="chat">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🖥️</div>
    <h2>Soporte técnico NexoLED</h2>
    <p>Soy el asistente de soporte para tus pantallas LED <strong style="color:var(--cyan)">Novastar TB1-4G</strong>. Descríbeme el problema que tienes y te ayudo a resolverlo paso a paso.</p>
  </div>
</div>

<div class="suggestions" id="sugs">
  <button class="sug-btn" onclick="sendSug(this)">App no conecta tras firmware</button>
  <button class="sug-btn" onclick="sendSug(this)">Pantalla en negro</button>
  <button class="sug-btn" onclick="sendSug(this)">No encuentro la red Wi-Fi</button>
  <button class="sug-btn" onclick="sendSug(this)">Contraseña incorrecta</button>
  <button class="sug-btn" onclick="sendSug(this)">Video se ve lento</button>
  <button class="sug-btn" onclick="sendSug(this)">Reset de fábrica</button>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="inp" placeholder="Describe tu problema aquí..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="footer-note">NexoLED · Soporte Novastar TB1-4G · Punta Arenas</div>
</div>

<script>
let history = [];
let busy = false;

const chatEl = document.getElementById('chat');
const inp = document.getElementById('inp');
const sendBtn = document.getElementById('sendBtn');
const sugsEl = document.getElementById('sugs');

function cerrarChat() {
  try {
    window.parent.toggleSupport();
  } catch(e) {
    window.history.back();
  }
}

inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
inp.addEventListener('input', () => {
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 130) + 'px';
});

function sendSug(btn) {
  inp.value = btn.textContent;
  send();
}

function addMsg(role, text) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();
  sugsEl.style.display = 'none';
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="avatar">${role === 'ai' ? 'NX' : '👤'}</div>
    <div class="bubble">${role === 'ai' ? mdToHtml(text) : escHtml(text)}</div>
  `;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing';
  div.innerHTML = `<div class="avatar">NX</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function mdToHtml(text) {
  let t = escHtml(text);
  t = t.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  t = t.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  t = t.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  t = t.replace(/`(.+?)`/g, '<code>$1</code>');
  t = t.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');
  t = t.replace(/(<li>.*<\/li>\n?)+/g, '<ol>$&</ol>');
  t = t.replace(/^[-•*]\s+(.+)$/gm, '<li>$1</li>');
  t = t.replace(/(<li>.*<\/li>\n?)+/g, m => m.includes('<ol>') ? m : '<ul>' + m + '</ul>');
  t = t.replace(/^---$/gm, '<hr>');
  t = t.split('\n\n').map(p => {
    p = p.trim();
    if (!p) return '';
    if (p.startsWith('<h') || p.startsWith('<ol') || p.startsWith('<ul') || p.startsWith('<hr')) return p;
    return `<p>${p.replace(/\n/g,'<br>')}</p>`;
  }).join('');
  return t;
}

async function send() {
  const text = inp.value.trim();
  if (!text || busy) return;

  busy = true;
  sendBtn.disabled = true;
  inp.value = '';
  inp.style.height = '50px';

  addMsg('user', text);
  history.push({ role: 'user', content: text });
  addTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });

    const data = await res.json();
    document.getElementById('typing')?.remove();

    if (data.error) {
      addMsg('ai', `Hubo un problema técnico. Contáctanos al **WhatsApp +56990188665** y te ayudamos de inmediato.`);
    } else {
      const reply = data.content.find(b => b.type === 'text')?.text || 'No pude generar una respuesta.';
      history.push({ role: 'assistant', content: reply });
      addMsg('ai', reply);
    }
  } catch (err) {
    document.getElementById('typing')?.remove();
    addMsg('ai', `Hubo un problema técnico. Contáctanos al **WhatsApp +56990188665** y te ayudamos de inmediato.`);
  }

  busy = false;
  sendBtn.disabled = false;
  inp.focus();
}
</script>
</body>
</html>
